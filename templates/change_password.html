{% extends "base.html" %}
{% block content %}

<div class="page-header">
  <div>
    <h4><i class="bi bi-key me-2"></i>Change Password</h4>
    <small class="text-muted">Update your login password</small>
  </div>
</div>

<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card">
      <div class="card-body p-4">

        <div class="d-flex align-items-center gap-3 mb-4 pb-3" style="border-bottom:1px solid #f0f0f0;">
          <div style="width:44px;height:44px;border-radius:50%;background:#1B3A6B;display:flex;align-items:center;justify-content:center;">
            <i class="bi bi-person-fill" style="color:#fff;font-size:20px;"></i>
          </div>
          <div>
            <div style="font-weight:700;font-size:15px;">{{ current_user.display }}</div>
            <div style="font-size:12px;color:#888;">@{{ current_user.username }}</div>
          </div>
        </div>

        <form method="POST" action="/change-password" id="pwForm">

          <div class="mb-3">
            <label class="form-label" style="font-size:13px;font-weight:600;">Current Password</label>
            <div class="input-group">
              <span class="input-group-text" style="background:#f8f9fa;">
                <i class="bi bi-lock" style="color:#1B3A6B;"></i>
              </span>
              <input type="password" name="current_password" class="form-control"
                     placeholder="Enter current password" required autocomplete="current-password">
              <button type="button" class="btn btn-outline-secondary" onclick="toggleField(this)"
                      style="font-size:12px;"><i class="bi bi-eye"></i></button>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label" style="font-size:13px;font-weight:600;">New Password</label>
            <div class="input-group">
              <span class="input-group-text" style="background:#f8f9fa;">
                <i class="bi bi-lock-fill" style="color:#1B3A6B;"></i>
              </span>
              <input type="password" name="new_password" id="new_pw" class="form-control"
                     placeholder="Min. 6 characters" required autocomplete="new-password"
                     oninput="checkStrength(this.value)">
              <button type="button" class="btn btn-outline-secondary" onclick="toggleField(this)"
                      style="font-size:12px;"><i class="bi bi-eye"></i></button>
            </div>
            <!-- Strength bar -->
            <div class="mt-1" style="height:4px;background:#e9ecef;border-radius:2px;">
              <div id="strength-bar" style="height:100%;width:0%;border-radius:2px;transition:width 0.3s,background 0.3s;"></div>
            </div>
            <small id="strength-text" class="text-muted" style="font-size:11px;"></small>
          </div>

          <div class="mb-4">
            <label class="form-label" style="font-size:13px;font-weight:600;">Confirm New Password</label>
            <div class="input-group">
              <span class="input-group-text" style="background:#f8f9fa;">
                <i class="bi bi-lock-fill" style="color:#1B3A6B;"></i>
              </span>
              <input type="password" name="confirm_password" id="confirm_pw" class="form-control"
                     placeholder="Repeat new password" required autocomplete="new-password"
                     oninput="checkMatch()">
              <button type="button" class="btn btn-outline-secondary" onclick="toggleField(this)"
                      style="font-size:12px;"><i class="bi bi-eye"></i></button>
            </div>
            <small id="match-text" style="font-size:11px;"></small>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-bim flex-grow-1">
              <i class="bi bi-check-lg me-1"></i> Update Password
            </button>
            <a href="/" class="btn btn-outline-secondary">Cancel</a>
          </div>

        </form>
      </div>
    </div>
  </div>
</div>

<script>
function toggleField(btn) {
  const input = btn.closest('.input-group').querySelector('input');
  const icon  = btn.querySelector('i');
  if (input.type === 'password') {
    input.type = 'text';
    icon.className = 'bi bi-eye-slash';
  } else {
    input.type = 'password';
    icon.className = 'bi bi-eye';
  }
}

function checkStrength(val) {
  const bar  = document.getElementById('strength-bar');
  const text = document.getElementById('strength-text');
  let score = 0;
  if (val.length >= 6)  score++;
  if (val.length >= 10) score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;

  const levels = [
    {pct:'0%',   color:'',        label:''},
    {pct:'25%',  color:'#dc3545', label:'Weak'},
    {pct:'50%',  color:'#fd7e14', label:'Fair'},
    {pct:'75%',  color:'#ffc107', label:'Good'},
    {pct:'90%',  color:'#198754', label:'Strong'},
    {pct:'100%', color:'#146c43', label:'Very strong'},
  ];
  const lvl = levels[Math.min(score, 5)];
  bar.style.width    = lvl.pct;
  bar.style.background = lvl.color;
  text.textContent   = lvl.label;
  text.style.color   = lvl.color;
  checkMatch();
}

function checkMatch() {
  const nw = document.getElementById('new_pw').value;
  const cp = document.getElementById('confirm_pw').value;
  const t  = document.getElementById('match-text');
  if (!cp) { t.textContent = ''; return; }
  if (nw === cp) {
    t.textContent = '✓ Passwords match';
    t.style.color = '#198754';
  } else {
    t.textContent = '✗ Passwords do not match';
    t.style.color = '#dc3545';
  }
}
</script>

{% endblock %}
