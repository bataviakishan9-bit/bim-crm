{% extends "base.html" %}
{% block content %}
<div class="page-header">
  <div>
    <h4><i class="bi bi-arrow-right-circle me-2"></i>Convert Lead to Project</h4>
    <small class="text-muted">{{ lead.first_name }} {{ lead.last_name }} — {{ lead.company }}</small>
  </div>
  <a href="/leads/{{ lead.id }}" class="btn btn-outline-secondary btn-sm">
    <i class="bi bi-arrow-left me-1"></i> Back to Lead
  </a>
</div>

<div class="card" style="max-width:700px;">
  <div class="card-header" style="background:#1B3A6B;color:#fff;">
    <strong><i class="bi bi-building me-2"></i>Project Details</strong>
  </div>
  <div class="card-body">
    <form method="post">
      <div class="row g-3">
        <div class="col-md-12">
          <label class="form-label fw-semibold">Project Name *</label>
          <input class="form-control" name="name" required
            value="{{ lead.company or '' }}">
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Client Name *</label>
          <input class="form-control" name="client_name" required
            value="{{ lead.company or '' }}">
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Client GSTIN</label>
          <input class="form-control" name="client_gstin" placeholder="e.g. 24AAACK8387R1ZP">
        </div>
        <div class="col-12">
          <label class="form-label fw-semibold">Client Address</label>
          <textarea class="form-control" name="client_address" rows="2">{{ lead.city or '' }}</textarea>
        </div>
        <div class="col-md-4">
          <label class="form-label fw-semibold">Start Date</label>
          <input type="date" class="form-control" name="start_date"
            value="{{ now.strftime('%Y-%m-%d') }}">
        </div>
        <div class="col-md-4">
          <label class="form-label fw-semibold">End Date</label>
          <input type="date" class="form-control" name="end_date">
        </div>
        <div class="col-md-4">
          <label class="form-label fw-semibold">Contract Value (INR)</label>
          <input type="number" class="form-control" name="total_value" step="0.01" placeholder="0">
        </div>
        <div class="col-12">
          <label class="form-label fw-semibold">Description / Scope</label>
          <textarea class="form-control" name="description" rows="3"
            placeholder="Brief project scope, deliverables..."></textarea>
        </div>
      </div>
      <div class="mt-4 d-flex gap-2">
        <button type="submit" class="btn btn-bim">
          <i class="bi bi-check-lg me-1"></i> Convert to Project
        </button>
        <a href="/leads/{{ lead.id }}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
