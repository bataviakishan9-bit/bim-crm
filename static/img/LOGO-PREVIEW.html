<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BIM Ribbon Mark · Preview</title>
<style>
  body { margin: 0; background: #000; color: #D4D4D4; font-family: system-ui, sans-serif;
         min-height: 100vh; display: grid; place-items: center; padding: 40px; }
  .grid { display: grid; gap: 60px; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
          max-width: 1200px; width: 100%; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 18px; }
  .cell .size { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.2em;
                color: #737373; text-transform: uppercase; }
  h1 { font-family: 'Space Grotesk', sans-serif; font-weight: 600; color: #FAFAFA;
       font-size: 28px; margin: 0 0 10px; letter-spacing: -0.02em; }
  .intro { text-align: center; margin-bottom: 40px; }
  .intro p { color: #A3A3A3; font-size: 13.5px; max-width: 520px; margin: 0 auto; }
  .bg-light { background: #FAFAFA; padding: 24px; border-radius: 8px; }
  .bg-gold { background: linear-gradient(135deg, #E8B84C, #B58022); padding: 24px; border-radius: 8px; }
</style>
</head>
<body>
  <div>
    <div class="intro">
      <h1>BIM Infra · Ribbon Mark</h1>
      <p>Silver-chrome ribbon "b" — rendered as SVG for crisp scaling at every size, from 16px favicon to 640px hero watermark.</p>
    </div>

    <div class="grid">
      <div class="cell">
        <img src="bim-mark.svg" width="48" height="48">
        <div class="size">48 · SIDEBAR</div>
      </div>
      <div class="cell">
        <img src="bim-mark.svg" width="80" height="80">
        <div class="size">80 · LOGIN HERO</div>
      </div>
      <div class="cell">
        <img src="bim-mark.svg" width="160" height="160">
        <div class="size">160 · SPLASH</div>
      </div>
      <div class="cell">
        <img src="bim-mark.svg" width="320" height="320" style="opacity:0.18;">
        <div class="size">320 · WATERMARK</div>
      </div>
      <div class="cell">
        <div class="bg-light"><img src="bim-mark.svg" width="80" height="80"></div>
        <div class="size">ON LIGHT</div>
      </div>
      <div class="cell">
        <div class="bg-gold"><img src="bim-mark.svg" width="80" height="80"></div>
        <div class="size">ON GOLD</div>
      </div>
      <div class="cell">
        <img src="favicon.svg" width="32" height="32">
        <div class="size">32 · FAVICON</div>
      </div>
      <div class="cell">
        <img src="favicon.svg" width="16" height="16">
        <div class="size">16 · TAB</div>
      </div>
    </div>
  </div>
</body>
</html>
